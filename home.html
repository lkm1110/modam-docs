<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Modam" />
  <meta property="og:title" content="Open Modam — Home" />
  <meta property="og:description" content="Open the Modam app on your device, or download from the App Store or Google Play." />
  <meta property="og:image" content="https://modam0401.github.io/modam-docs/og-default.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Open Modam — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C8A96E;
      --bg: #010204;
      --card: #0B0F1A;
      --border: #1A2235;
      --text: #E5E7EB;
      --muted: #6B7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    #card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      padding: 28px 24px 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 10px;
      text-align: center;
    }
    p.lead {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn-open {
      display: block;
      width: 100%;
      text-align: center;
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--gold) 0%, #B8924A 100%);
      color: #0a0a0a;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .btn-open:hover { opacity: 0.95; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 12px; color: var(--muted); }
    .store-buttons { display: flex; gap: 10px; }
    .btn-store {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
    }
    .btn-store:hover { border-color: var(--gold); background: rgba(200,169,110,0.06); }
    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: var(--gold);
      font-size: 14px;
      text-decoration: none;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 6px;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div id="card">
    <h1>Modam</h1>
    <p class="lead">Tap below to open the app on the Home feed. If the app isn’t installed, use the store links.</p>
    <a class="btn-open" id="btnOpenApp" href="#">Open Modam (Home)</a>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Don’t have the app?</span>
      <div class="divider-line"></div>
    </div>
    <div class="store-buttons">
      <a class="btn-store" href="https://apps.apple.com/app/id6753962694" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        App Store
      </a>
      <a class="btn-store" href="https://play.google.com/store/apps/details?id=com.artyard.app" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.54 3.99zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Google Play
      </a>
    </div>
    <a class="back" href="https://modam0401.github.io/modam-docs/index.html">← Modam site</a>
  </div>
  <p class="logo">Modam</p>

<script>
  const APP_SCHEME = 'artyard';
  const DEEP_HOME = `${APP_SCHEME}://home`;

  function tryOpenApp() {
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = DEEP_HOME;
    document.body.appendChild(iframe);
    setTimeout(() => {
      try { document.body.removeChild(iframe); } catch (e) {}
    }, 2000);
  }

  document.getElementById('btnOpenApp').href = DEEP_HOME;
  tryOpenApp();
</script>
</body>
</html>
